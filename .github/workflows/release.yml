name: Release Android APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      WARGAME_UPLOAD_STORE_FILE: upload-keystore.jks
      WARGAME_UPLOAD_STORE_PASSWORD: ${{ secrets.WARGAME_UPLOAD_STORE_PASSWORD }}
      WARGAME_UPLOAD_KEY_ALIAS: ${{ secrets.WARGAME_UPLOAD_KEY_ALIAS }}
      WARGAME_UPLOAD_KEY_PASSWORD: ${{ secrets.WARGAME_UPLOAD_KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Prepare Android signing
        env:
          WARGAME_UPLOAD_KEYSTORE_BASE64: ${{ secrets.WARGAME_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          test -n "${WARGAME_UPLOAD_KEYSTORE_BASE64:-}"
          test -n "${WARGAME_UPLOAD_STORE_PASSWORD:-}"
          test -n "${WARGAME_UPLOAD_KEY_ALIAS:-}"
          test -n "${WARGAME_UPLOAD_KEY_PASSWORD:-}"
          printf '%s' "$WARGAME_UPLOAD_KEYSTORE_BASE64" | base64 --decode > android/upload-keystore.jks
          test -s android/upload-keystore.jks

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build signed APK
        run: flutter build apk --release

      - name: Verify and rename APK
        run: |
          set -euo pipefail
          apk_path=build/app/outputs/flutter-apk/app-release.apk
          test -f "$apk_path"
          apksigner_path="$(find "$ANDROID_HOME/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -n "$apksigner_path"
          "$apksigner_path" verify --verbose "$apk_path"
          cp "$apk_path" "wargame-tab-${GITHUB_REF_NAME}.apk"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          artifact="wargame-tab-${GITHUB_REF_NAME}.apk"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "$artifact" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "$artifact" \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
